services:
  corrugation:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - ${SERVICE_PORT}:${SERVICE_PORT}
    restart: "no"
    environment:
      - SERVICE_ADDRESS
      - SERVICE_PORT
      - SERVICE_DIST
      - SERVICE_DATA
      - SERVICE_OIDC_DISCOVERY_URL
      - SERVICE_OIDC_CLIENT_ID
      - SERVICE_OIDC_INSECURE_SKIP_VERIFY=true
      - SERVICE_INFINITY_ADDRESS=http://infinity:${INFINITY_PORT}
      - SERVICE_INFINITY_IMAGE_MODEL
      - SERVICE_INFINITY_TEXT_MODEL
    volumes:
      - ./data/corrugation:/data
    depends_on:
      - infinity
  infinity:
    image: michaelf34/infinity:latest
    ports:
      - ${INFINITY_PORT}:${INFINITY_PORT}
    environment:
      - INFINITY_PORT
      - SERVICE_INFINITY_IMAGE_MODEL
      - SERVICE_INFINITY_TEXT_MODEL
    command: v2 --engine torch --device cpu --model-id ${SERVICE_INFINITY_IMAGE_MODEL} --model-id ${SERVICE_INFINITY_TEXT_MODEL} --port ${INFINITY_PORT} --log-level warning
    restart: unless-stopped
    volumes:
      - ./data/infinity/:/app/.cache
