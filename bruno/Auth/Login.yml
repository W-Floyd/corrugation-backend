info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/login"
  headers:
    - name: content-type
      value: application/json
  body:
    type: json
    data: |-
      {
        "username": "{{username}}",
        "password": "{{password}}"
      }
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200 && res.body.token) {
          bru.setEnvVar("authToken", res.body.token);
        }
    - type: tests
      code: |-
        test("Login succeeds", function() {
          expect(res.status).to.equal(200);
        });
        test("Token is returned", function() {
          expect(res.body).to.have.property("token");
          expect(res.body.token).to.be.a("string").and.not.empty;
        });
