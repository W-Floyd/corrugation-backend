info:
  name: Fetch Auth Config
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/api/auth/config"
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setEnvVar("oidcAuthorizationUrl", res.body.authorizationEndpoint);
        bru.setEnvVar("oidcTokenUrl", res.body.tokenEndpoint);
        bru.setEnvVar("oidcClientId", res.body.clientId);
