info:
  name: OIDC Login
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}"
  auth:
    type: oauth2
    flow: authorization_code
    authorizationUrl: "{{oidcAuthorizationUrl}}"
    accessTokenUrl: "{{oidcTokenUrl}}"
    callbackUrl: http://localhost:8083/callback
    credentials:
      clientId: "{{oidcClientId}}"
      placement: body
    scope: openid profile email
    pkce: {}
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: true
      autoRefreshToken: false

runtime:
  scripts:
    - type: after-response
      code: |-
        const token = bru.getOauth2CredentialVar("$oauth2.credentials.access_token");
        if (token) {
          bru.setEnvVar("authToken", token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
