info:
  name: Get Full Store
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/store"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Entities is empty after reset", function() {
          expect(res.body.entities).to.deep.equal({});
        });
        test("Artifacts is empty after reset", function() {
          expect(res.body.artifacts).to.deep.equal({});
        });
        test("lastartifactid is 0", function() {
          expect(res.body.lastartifactid).to.equal(0);
        });
        test("storeversion is 1", function() {
          expect(res.body.storeversion).to.equal(1);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
