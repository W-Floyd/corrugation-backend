info:
  name: 23 Check Next ID After Deleting A
  type: http
  seq: 23

http:
  method: GET
  url: "{{baseUrl}}/api/entity/find/nextid"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        // Deletions don't lower nextId — Unscoped MAX includes soft-deleted
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("nextId unchanged after deleting A", function() {
          expect(res.body).to.equal(parseInt(bru.getEnvVar("expectedNextId")));
        });
