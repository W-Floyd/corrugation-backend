info:
  name: Get First Free ID
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/entity/find/firstfreeid"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("freeEntityId", res.body);
        }
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Free ID is 1 after reset", function() {
          expect(res.body).to.equal(1);
        });
