info:
  name: 18 Create Labeled Entity A
  type: http
  seq: 18

http:
  method: POST
  url: "{{baseUrl}}/api/entity"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Labeled Entity A",
        "location": 0,
        "metadata": {
          "quantity": 1,
          "owners": [],
          "tags": [],
          "islabeled": true
        }
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setEnvVar("labeledEntityIdA", res.body);
        }
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
