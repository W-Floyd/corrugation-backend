info:
  name: 03 Get All Entities
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/entity"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const e = res.body["1"];
        const m = e && e.metadata;

        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Contains exactly one entity", function() {
          expect(Object.keys(res.body)).to.deep.equal(["1"]);
        });
        test("Entity 1 id is correct", function() {
          expect(e.id).to.equal(1);
        });
        test("Entity 1 name is correct", function() {
          expect(e.name).to.equal("Bruno Test Box");
        });
        test("Entity 1 description is correct", function() {
          expect(e.description).to.equal("Created by Bruno test suite");
        });
        test("Entity 1 artifacts is null", function() {
          expect(e.artifacts).to.be.null;
        });
        test("Entity 1 location is correct", function() {
          expect(e.location).to.equal(0);
        });
        test("Entity 1 quantity is correct", function() {
          expect(m.quantity).to.equal(3);
        });
        test("Entity 1 owners is correct", function() {
          expect(m.owners).to.deep.equal([]);
        });
        test("Entity 1 tags are correct", function() {
          expect(m.tags).to.have.members(["test", "bruno"]);
        });
        test("Entity 1 islabeled is correct", function() {
          expect(m.islabeled).to.equal(false);
        });
        test("Entity 1 lastmodifiedby is correct", function() {
          expect(m.lastmodifiedby).to.be.oneOf(["admin", "william"]);
        });
        test("Entity 1 lastmodified is a string", function() {
          expect(m.lastmodified).to.be.a("string").and.not.empty;
        });
