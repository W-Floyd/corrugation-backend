info:
  name: Get All Entities
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/entity"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Contains exactly one entity", function() {
          expect(Object.keys(res.body)).to.deep.equal(["1"]);
        });
        test("Entity 1 has correct fields", function() {
          const e = res.body["1"];
          expect(e.id).to.equal(1);
          expect(e.name).to.equal("Bruno Test Box");
          expect(e.description).to.equal("Created by Bruno test suite");
          expect(e.artifacts).to.be.null;
          expect(e.location).to.equal(0);
        });
        test("Entity 1 metadata is correct", function() {
          const m = res.body["1"].metadata;
          expect(m.quantity).to.equal(3);
          expect(m.owners).to.deep.equal([]);
          expect(m.tags).to.deep.equal(["test", "bruno"]);
          expect(m.islabeled).to.equal(false);
          expect(m.lastmodifiedby).to.equal("admin");
          expect(m.lastmodified).to.be.a("string").and.not.empty;
        });
