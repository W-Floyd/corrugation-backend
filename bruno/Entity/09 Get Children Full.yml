info:
  name: Get Children Full
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseUrl}}/api/entity/find/children/0/full"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const e = res.body[0];
        const m = e && e.metadata;

        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns exactly one child", function() {
          expect(res.body).to.be.an("array").with.lengthOf(1);
        });
        test("id is correct", function() {
          expect(e.id).to.equal(1);
        });
        test("name is correct", function() {
          expect(e.name).to.equal("Bruno Test Box (patched)");
        });
        test("description is correct", function() {
          expect(e.description).to.equal("Updated by PUT");
        });
        test("artifacts is null", function() {
          expect(e.artifacts).to.be.null;
        });
        test("location is correct", function() {
          expect(e.location).to.equal(0);
        });
        test("quantity is correct", function() {
          expect(m.quantity).to.equal(7);
        });
        test("owners is correct", function() {
          expect(m.owners).to.deep.equal(["tester"]);
        });
        test("tags are correct", function() {
          expect(m.tags).to.have.members(["test", "replaced"]);
        });
        test("islabeled is correct", function() {
          expect(m.islabeled).to.equal(false);
        });
        test("lastmodifiedby is correct", function() {
          expect(m.lastmodifiedby).to.be.oneOf(["admin", "william"]);
        });
        test("lastmodified is a non-empty string", function() {
          expect(m.lastmodified).to.be.a("string").and.not.empty;
        });
