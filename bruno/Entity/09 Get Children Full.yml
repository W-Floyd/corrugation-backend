info:
  name: Get Children Full
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseUrl}}/api/entity/find/children/0/full"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns exactly one child", function() {
          expect(res.body).to.be.an("array").with.lengthOf(1);
        });
        test("Child entity fields are correct", function() {
          const e = res.body[0];
          expect(e.id).to.equal(1);
          expect(e.name).to.equal("Bruno Test Box (patched)");
          expect(e.description).to.equal("Updated by PUT");
          expect(e.artifacts).to.be.null;
          expect(e.location).to.equal(0);
        });
        test("Child entity metadata is correct", function() {
          const m = res.body[0].metadata;
          expect(m.quantity).to.equal(7);
          expect(m.owners).to.deep.equal(["tester"]);
          expect(m.tags).to.deep.equal(["test", "replaced"]);
          expect(m.islabeled).to.equal(false);
          expect(m.lastmodifiedby).to.equal("admin");
          expect(m.lastmodified).to.be.a("string").and.not.empty;
        });
