info:
  name: Get Entity
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/api/entity/{{entityId}}"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const e = res.body;
        const m = e.metadata;

        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("id is correct", function() {
          expect(e.id).to.equal(1);
        });
        test("name is correct", function() {
          expect(e.name).to.equal("Bruno Test Box");
        });
        test("description is correct", function() {
          expect(e.description).to.equal("Created by Bruno test suite");
        });
        test("artifacts is null", function() {
          expect(e.artifacts).to.be.null;
        });
        test("location is correct", function() {
          expect(e.location).to.equal(0);
        });
        test("quantity is correct", function() {
          expect(m.quantity).to.equal(3);
        });
        test("owners is correct", function() {
          expect(m.owners).to.deep.equal([]);
        });
        test("tags are correct", function() {
          expect(m.tags).to.have.members(["test", "bruno"]);
        });
        test("islabeled is correct", function() {
          expect(m.islabeled).to.equal(false);
        });
        test("lastmodifiedby is correct", function() {
          expect(m.lastmodifiedby).to.equal("admin");
        });
        test("lastmodified is a non-empty string", function() {
          expect(m.lastmodified).to.be.a("string").and.not.empty;
        });
