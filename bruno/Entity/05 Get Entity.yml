info:
  name: Get Entity
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/api/entity/{{entityId}}"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Top-level fields are correct", function() {
          expect(res.body.id).to.equal(1);
          expect(res.body.name).to.equal("Bruno Test Box");
          expect(res.body.description).to.equal("Created by Bruno test suite");
          expect(res.body.artifacts).to.be.null;
          expect(res.body.location).to.equal(0);
        });
        test("Metadata is correct", function() {
          const m = res.body.metadata;
          expect(m.quantity).to.equal(3);
          expect(m.owners).to.deep.equal([]);
          expect(m.tags).to.have.members(["test", "bruno"]);
          expect(m.islabeled).to.equal(false);
          expect(m.lastmodifiedby).to.equal("admin");
          expect(m.lastmodified).to.be.a("string").and.not.empty;
        });
