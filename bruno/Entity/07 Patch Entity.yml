info:
  name: Patch Entity
  type: http
  seq: 7

http:
  method: PATCH
  url: "{{baseUrl}}/api/entity/{{entityId}}"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Bruno Test Box (patched)",
        "metadata": {
          "quantity": 7
        }
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const e = res.body;
        const m = e.metadata;

        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("id is correct", function() {
          expect(e.id).to.equal(1);
        });
        test("name is updated", function() {
          expect(e.name).to.equal("Bruno Test Box (patched)");
        });
        test("description is preserved", function() {
          expect(e.description).to.equal("Updated by PUT");
        });
        test("artifacts is null", function() {
          expect(e.artifacts).to.be.null;
        });
        test("location is correct", function() {
          expect(e.location).to.equal(0);
        });
        test("quantity is updated", function() {
          expect(m.quantity).to.equal(7);
        });
        test("owners is preserved", function() {
          expect(m.owners).to.deep.equal(["tester"]);
        });
        test("tags are preserved", function() {
          expect(m.tags).to.have.members(["test", "replaced"]);
        });
        test("islabeled is preserved", function() {
          expect(m.islabeled).to.equal(false);
        });
        test("lastmodifiedby is correct", function() {
          expect(m.lastmodifiedby).to.equal("admin");
        });
        test("lastmodified is a non-empty string", function() {
          expect(m.lastmodified).to.be.a("string").and.not.empty;
        });
