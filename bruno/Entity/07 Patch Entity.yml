info:
  name: Patch Entity
  type: http
  seq: 7

http:
  method: PATCH
  url: "{{baseUrl}}/api/entity/{{entityId}}"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Bruno Test Box (patched)",
        "metadata": {
          "quantity": 7
        }
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Top-level fields are correct", function() {
          expect(res.body.id).to.equal(1);
          expect(res.body.name).to.equal("Bruno Test Box (patched)");
          expect(res.body.description).to.equal("Updated by PUT");
          expect(res.body.artifacts).to.be.null;
          expect(res.body.location).to.equal(0);
        });
        test("Metadata reflects patch and preserved fields", function() {
          const m = res.body.metadata;
          expect(m.quantity).to.equal(7);
          expect(m.owners).to.deep.equal(["tester"]);
          expect(m.tags).to.have.members(["test", "replaced"]);
          expect(m.islabeled).to.equal(false);
          expect(m.lastmodifiedby).to.equal("admin");
          expect(m.lastmodified).to.be.a("string").and.not.empty;
        });
