info:
  name: 02 Create Entity
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/entity"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Bruno Test Box",
        "description": "Created by Bruno test suite",
        "location": 0,
        "metadata": {
          "quantity": 3,
          "owners": [],
          "tags": ["test", "bruno"],
          "islabeled": false
        }
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("entityId", res.body);
          bru.setEnvVar("entityId", res.body);
        }
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns entity ID as string", function() {
          expect(res.body).to.equal("1");
        });
