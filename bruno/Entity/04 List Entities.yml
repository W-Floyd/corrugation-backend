info:
  name: 04 List Entities
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/api/entity/list"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns exactly one entity ID", function() {
          expect(res.body).to.deep.equal(["1"]);
        });
