info:
  name: 01 Create Entity for QR
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/entity"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "QR Test Entity",
        "location": 0,
        "metadata": {
          "quantity": 1,
          "owners": [],
          "tags": [],
          "islabeled": false
        }
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("qrEntityId", res.body);
          bru.setEnvVar("qrEntityId", res.body);
        }
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
