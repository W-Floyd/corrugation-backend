info:
  name: List Artifacts
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/api/artifact/list"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns exactly one artifact", function() {
          expect(res.body).to.deep.equal(["1.webp"]);
        });
