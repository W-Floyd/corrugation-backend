info:
  name: Upload Artifact
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/artifact"
  headers:
    - name: accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: file
        value:
          - ./fixtures/sample.jpg
        type: file
      - name: entityId
        value: "{{entityId}}"
        type: text
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("artifactId", res.body);
          bru.setEnvVar("artifactId", res.body);
        }
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns artifact ID as string", function() {
          expect(res.body).to.be.a("string");
        });
