info:
  name: Get Artifact QR Code
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/api/artifact/{{artifactId}}/qrcode"
  headers:
    - name: accept
      value: image/png
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const { decodeQR } = require('./lib/qr');
        const qrData = decodeQR(res.getDataBuffer());

        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Content-Type is image/png", function() {
          expect(res.headers["content-type"]).to.include("image/png");
        });
        test("QR code decodes to artifact ID", function() {
          expect(qrData).to.equal(String(bru.getVar("artifactId")));
        });
