info:
  name: Parent Contains Child
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/api/entity/{{parentId}}/contains"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Parent directly contains child", function() {
          expect(res.body).to.be.an("array");
          expect(res.body.map(String)).to.include(bru.getVar("childId"));
        });
        test("Parent does not directly contain grandchild", function() {
          expect(res.body.map(String)).to.not.include(bru.getVar("grandchildId"));
        });
