info:
  name: Get Children Full Recursive
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/api/entity/find/children/{{parentId}}/full/recursive"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns both child and grandchild", function() {
          expect(res.body).to.be.an("array").with.lengthOf(2);
        });
        test("Contains child by name", function() {
          expect(res.body.map(e => e.name)).to.include("Child Box");
        });
        test("Contains grandchild by name", function() {
          expect(res.body.map(e => e.name)).to.include("Grandchild Box");
        });
