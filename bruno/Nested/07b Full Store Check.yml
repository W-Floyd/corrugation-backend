info:
  name: Full Store Check
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/api/store"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const parent = res.body.entities[bru.getVar("parentId")];
        const child = res.body.entities[bru.getVar("childId")];
        const grandchild = res.body.entities[bru.getVar("grandchildId")];

        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Store contains exactly 3 entities", function() {
          expect(Object.keys(res.body.entities)).to.have.lengthOf(3);
        });
        test("Store artifacts is empty", function() {
          expect(res.body.artifacts).to.deep.equal({});
        });

        test("Parent id is correct", function() {
          expect(parent.id).to.equal(Number(bru.getVar("parentId")));
        });
        test("Parent name is correct", function() {
          expect(parent.name).to.equal("Parent Box");
        });
        test("Parent description is correct", function() {
          expect(parent.description).to.equal("Top-level container");
        });
        test("Parent artifacts is null", function() {
          expect(parent.artifacts).to.be.null;
        });
        test("Parent location is correct", function() {
          expect(parent.location).to.equal(0);
        });
        test("Parent quantity is correct", function() {
          expect(parent.metadata.quantity).to.equal(1);
        });
        test("Parent owners is correct", function() {
          expect(parent.metadata.owners).to.deep.equal([]);
        });
        test("Parent tags are correct", function() {
          expect(parent.metadata.tags).to.have.members(["parent"]);
        });
        test("Parent islabeled is correct", function() {
          expect(parent.metadata.islabeled).to.equal(false);
        });

        test("Child id is correct", function() {
          expect(child.id).to.equal(Number(bru.getVar("childId")));
        });
        test("Child name is correct", function() {
          expect(child.name).to.equal("Child Box");
        });
        test("Child description is correct", function() {
          expect(child.description).to.equal("Nested inside Parent Box");
        });
        test("Child artifacts is null", function() {
          expect(child.artifacts).to.be.null;
        });
        test("Child location is correct", function() {
          expect(child.location).to.equal(Number(bru.getVar("parentId")));
        });
        test("Child quantity is correct", function() {
          expect(child.metadata.quantity).to.equal(1);
        });
        test("Child owners is correct", function() {
          expect(child.metadata.owners).to.deep.equal([]);
        });
        test("Child tags are correct", function() {
          expect(child.metadata.tags).to.have.members(["child"]);
        });
        test("Child islabeled is correct", function() {
          expect(child.metadata.islabeled).to.equal(false);
        });

        test("Grandchild id is correct", function() {
          expect(grandchild.id).to.equal(Number(bru.getVar("grandchildId")));
        });
        test("Grandchild name is correct", function() {
          expect(grandchild.name).to.equal("Grandchild Box");
        });
        test("Grandchild description is correct", function() {
          expect(grandchild.description).to.equal("Nested inside Child Box");
        });
        test("Grandchild artifacts is null", function() {
          expect(grandchild.artifacts).to.be.null;
        });
        test("Grandchild location is correct", function() {
          expect(grandchild.location).to.equal(Number(bru.getVar("childId")));
        });
        test("Grandchild quantity is correct", function() {
          expect(grandchild.metadata.quantity).to.equal(1);
        });
        test("Grandchild owners is correct", function() {
          expect(grandchild.metadata.owners).to.deep.equal([]);
        });
        test("Grandchild tags are correct", function() {
          expect(grandchild.metadata.tags).to.have.members(["grandchild"]);
        });
        test("Grandchild islabeled is correct", function() {
          expect(grandchild.metadata.islabeled).to.equal(false);
        });
