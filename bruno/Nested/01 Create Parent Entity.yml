info:
  name: Create Parent Entity
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/entity"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Parent Box",
        "description": "Top-level container",
        "location": 0,
        "metadata": {
          "quantity": 1,
          "owners": [],
          "tags": ["parent"],
          "islabeled": false
        }
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("parentId", res.body);
          bru.setEnvVar("parentId", res.body);
        }
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns parent entity ID as string", function() {
          expect(res.body).to.be.a("string");
        });
