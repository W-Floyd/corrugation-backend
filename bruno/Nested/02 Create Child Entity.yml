info:
  name: Create Child Entity
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/entity"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Child Box",
        "description": "Nested inside Parent Box",
        "location": {{parentId}},
        "metadata": {
          "quantity": 1,
          "owners": [],
          "tags": ["child"],
          "islabeled": false
        }
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("childId", res.body);
          bru.setEnvVar("childId", res.body);
        }
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns child entity ID as string", function() {
          expect(res.body).to.be.a("string");
        });
