info:
  name: Find Locations Includes Parent
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/api/entity/find/locations"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Parent and child appear as locations", function() {
          const ids = res.body.map(String);
          expect(ids).to.include(bru.getVar("parentId"));
          expect(ids).to.include(bru.getVar("childId"));
        });
