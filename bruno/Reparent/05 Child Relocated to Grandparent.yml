info:
  name: Child Relocated to Grandparent
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/api/entity/{{reparentChildId}}"
  headers:
    - name: accept
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Child location is now grandparent", function() {
          expect(String(res.body.location)).to.equal(bru.getVar("reparentGrandparentId"));
        });
