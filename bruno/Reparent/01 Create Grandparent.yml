info:
  name: Create Grandparent
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/entity"
  headers:
    - name: content-type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Grandparent Box",
        "location": 0,
        "metadata": { "quantity": 1, "owners": [], "tags": [], "islabeled": false }
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("reparentGrandparentId", res.body);
        }
    - type: tests
      code: |-
        test("Returns 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Returns ID as string", function() {
          expect(res.body).to.be.a("string");
        });
