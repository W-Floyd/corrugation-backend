<!-- Camera Modal -->
<div x-show="$store.camera.opened" style="display: none"
    x-on:keydown.escape.prevent.stop="$store.camera.close()"
    class="fixed inset-0 z-50 bg-black">

    <!-- Live viewfinder -->
    <video id="cameraVideo" autoplay playsinline
        x-show="!$store.camera.previewUrl"
        style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain;"></video>

    <!-- Preview after capture -->
    <img x-show="$store.camera.previewUrl" :src="$store.camera.previewUrl"
        style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain;">

    <canvas id="cameraCanvas" class="hidden"></canvas>

    <!-- Shooting controls — bottom in portrait, right in landscape -->
    <div x-show="!$store.camera.previewUrl"
        :class="$store.camera.landscape
            ? 'absolute right-0 top-0 h-full flex flex-col items-center justify-center gap-4'
            : 'absolute bottom-0 left-0 w-full flex flex-row items-center justify-center gap-4'"
        :style="$store.camera.landscape
            ? 'padding-right: max(2rem, env(safe-area-inset-right))'
            : 'padding-bottom: max(2rem, env(safe-area-inset-bottom))'">
        <button type="button" @click="$store.camera.capture()"
            class="h-16 w-16 bg-white rounded-full shadow-lg border-4 border-gray-300 hover:bg-gray-100 active:scale-95">
        </button>
        <button type="button" @click="$store.camera.close()"
            class="h-10 px-4 py-2 text-white bg-red-500 rounded-full shadow hover:bg-red-600 active:shadow-lg">
            Cancel
        </button>
    </div>

    <!-- Preview controls — bottom in portrait, right in landscape -->
    <div x-show="$store.camera.previewUrl"
        :class="$store.camera.landscape
            ? 'absolute right-0 top-0 h-full flex flex-col items-center justify-center gap-4'
            : 'absolute bottom-0 left-0 w-full flex flex-row items-center justify-center gap-4'"
        :style="$store.camera.landscape
            ? 'padding-right: max(2rem, env(safe-area-inset-right))'
            : 'padding-bottom: max(2rem, env(safe-area-inset-bottom))'">
        <button type="button" @click="$store.camera.confirm()"
            class="h-10 px-4 py-2 text-white bg-blue-500 rounded-full shadow hover:bg-blue-600 active:shadow-lg">
            Use Photo
        </button>
        <button type="button" @click="$store.camera.rotate()"
            class="h-10 px-4 py-2 text-white bg-yellow-500 rounded-full shadow hover:bg-yellow-600 active:shadow-lg">
            Rotate
        </button>
        <button type="button" @click="$store.camera.retake()"
            class="h-10 px-4 py-2 text-white bg-gray-500 rounded-full shadow hover:bg-gray-600 active:shadow-lg">
            Retake
        </button>
        <button type="button" @click="$store.camera.close()"
            class="h-10 px-4 py-2 text-white bg-red-500 rounded-full shadow hover:bg-red-600 active:shadow-lg">
            Cancel
        </button>
    </div>

</div>
