<body x-data class="text-black transition duration-200 ease-in dark:text-white bg-gray-50 dark:bg-gray-900">

    <h1 x-show="$store.isLoading">Loading...</h1>

    <div x-show="!$store.isLoading">

        <div class="container mx-auto">
            <nav class="w-full rounded-md overflow-x-auto pt-4 px-4">
                <ol class="flex flex-wrap list-reset">
                    <template x-for="(n, index) in $store.entities.locationtree">
                        <div class="flex list-reset">

                            <li>
                                <a @click="$store.entities.setCurrentEntity(n)"
                                    class="text-blue-600 no-underline cursor-pointer dark:text-sky-400 dark:hover:text-sky-300 hover:text-blue-700 hover:underline"
                                    x-text="$store.entities.readname(n)"></a>
                            </li>

                            <li>
                                <span class="mx-2 text-gray-500">/</span>
                            </li>

                        </div>
                    </template>
                    <li>
                        <span
                            class="font-bold text-blue-600 cursor-pointer dark:text-sky-400 dark:hover:text-sky-300 hover:text-blue-700"
                            @click="$store.newEntityDialog.open($store.entities.currentEntity)">+</span>
                    </li>
                </ol>
            </nav>

            <!-- Search -->
            <div class="flex flex-row items-center gap-2">
                <div>
                    <svg viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
                        <path fill-rule="evenodd"
                            d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM6.262 6.072a8.25 8.25 0 1010.562-.766 4.5 4.5 0 01-1.318 1.357L14.25 7.5l.165.33a.809.809 0 01-1.086 1.085l-.604-.302a1.125 1.125 0 00-1.298.21l-.132.131c-.439.44-.439 1.152 0 1.591l.296.296c.256.257.622.374.98.314l1.17-.195c.323-.054.654.036.905.245l1.33 1.108c.32.267.46.694.358 1.1a8.7 8.7 0 01-2.288 4.04l-.723.724a1.125 1.125 0 01-1.298.21l-.153-.076a1.125 1.125 0 01-.622-1.006v-1.089c0-.298-.119-.585-.33-.796l-1.347-1.347a1.125 1.125 0 01-.21-1.298L9.75 12l-1.64-1.64a6 6 0 01-1.676-3.257l-.172-1.03z"
                            clip-rule="evenodd" />
                    </svg>
                </div>

                <input type="checkbox" x-model="$store.entities.filterworld" class="float-left" />

                <div>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                    </svg>
                </div>

                <input type="checkbox" x-model="$store.entities.searchdescription" class="float-left" />

                <input type="checkbox" x-model="$store.clip.enabled"
                    @change="$store.clip.enabled ? $store.clip.search($store.entities.searchtext) : ($store.clip.results = [])"
                    class="float-left" title="Visual search" />

                <input x-model="$store.entities.searchtextpredebounce"
                    @input.debounce.500ms="$store.entities.debouncesearch(); $store.clip.enabled && $store.clip.search($store.entities.searchtextpredebounce)"
                    placeholder="Search for an entity..."
                    type="search"
                    class="w-full px-4 py-1 m-4 mx-auto bg-white rounded-full dark:bg-gray-900 ring-1 ring-gray-500/25" />

                <span x-show="$store.clip.enabled && ($store.clip.searching || $store.clip.modelLoading || $store.clip.encoded < $store.clip.total)"
                    class="flex items-center gap-1 shrink-0 pr-2">
                    <svg class="animate-spin w-4 h-4 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    <span class="text-xs text-gray-400 whitespace-nowrap">
                        <span x-show="$store.clip.modelLoading">Loading…</span>
                        <span x-show="!$store.clip.modelLoading && $store.clip.encoded < $store.clip.total"
                            x-text="$store.clip.encoded + '/' + $store.clip.total"></span>
                    </span>
                </span>
            </div>

            <!-- Empty -->
            <p x-show="!$store.entities.hasChildren($store.entities.currentEntity)" class="text-2xl text-gray-500/50">
                Empty</p>

            <div class="flex flex-wrap justify-center gap-4">

                <template x-for="entity in $store.clip.merge($store.entities.load($store.entities.currentEntity, $store.entities.searchtext))"
                    :key="entity.id">

                    {{ include "layouts/card" }}

                </template>

                <!-- Quick capture card -->
                <figure
                    class="container relative h-full max-w-sm min-w-sm grow flex items-center justify-center rounded-xl border-2 border-dashed border-gray-300 dark:border-gray-600 bg-transparent cursor-pointer hover:border-blue-400 dark:hover:border-blue-500 hover:bg-blue-50/50 dark:hover:bg-blue-900/10 transition-colors min-h-40"
                    @click="$store.api.quickCapture($store.entities.currentEntity)">
                    <div class="flex flex-col items-center gap-2 text-gray-400 dark:text-gray-500 hover:text-blue-400 dark:hover:text-blue-500 pointer-events-none select-none">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10">
                            <path d="M12 9a3.75 3.75 0 1 0 0 7.5A3.75 3.75 0 0 0 12 9Z" />
                            <path fill-rule="evenodd" d="M9.344 3.071a49.52 49.52 0 0 1 5.312 0c.967.052 1.83.585 2.332 1.39l.821 1.317c.24.383.645.643 1.11.71.386.054.77.113 1.152.177 1.432.239 2.429 1.493 2.429 2.909V18a3 3 0 0 1-3 3h-15a3 3 0 0 1-3-3V9.574c0-1.416.997-2.67 2.429-2.909.382-.064.766-.123 1.151-.177a1.56 1.56 0 0 0 1.11-.71l.822-1.318a2.75 2.75 0 0 1 2.332-1.39ZM6.75 12.75a5.25 5.25 0 1 1 10.5 0 5.25 5.25 0 0 1-10.5 0Zm12-1.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z" clip-rule="evenodd" />
                        </svg>
                    </div>
                </figure>

            </div>
        </div>

        {{ include "layouts/newEntity" }}

        {{ include "layouts/moveEntity" }}

    </div>

    {{ include "layouts/camera" }}

    <!-- Toasts -->
    <div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 items-end pointer-events-none">
        <template x-for="toast in $store.toasts.items" :key="toast.id">
            <div class="flex items-start gap-2 max-w-sm px-4 py-3 bg-red-50 dark:bg-red-900/40 text-red-700 dark:text-red-300 rounded-lg shadow-lg ring-1 ring-red-200 dark:ring-red-700 pointer-events-auto"
                x-transition>
                <span class="text-sm break-words" x-text="toast.message"></span>
                <button @click="$store.toasts.remove(toast.id)" class="shrink-0 text-red-400 hover:text-red-600 dark:hover:text-red-200">&times;</button>
            </div>
        </template>
    </div>

</body>
